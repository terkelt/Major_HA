title: IEM Cologne Major 2026
path: iem-cologne
icon: mdi:trophy-outline
cards:

  # === HEADER ===
  - type: markdown
    content: >
      ## IEM Cologne Major 2026

      **ESL | LANXESS Arena, Cologne, Germany** | Preisgeld: **1.250.000 USD** | 32 Teams

      | Stage 1 | Stage 2 | Stage 3 | Playoffs |
      |:-------:|:-------:|:-------:|:--------:|
      | 2.-5. Juni | 6.-9. Juni | 11.-15. Juni | 18.-21. Juni |
      | Challengers | Legends | Champions | Finale |
      | 16 Teams | 8+8 Teams | 8+8 Teams | 8 Teams |

  # === STATUS TILES ===
  - type: grid
    square: false
    columns: 4
    cards:
      - type: tile
        entity: sensor.iem_cologne_phase
        name: Aktive Phase
        vertical: true
        icon: mdi:tournament
      - type: tile
        entity: sensor.iem_cologne_score_signals
        name: Score-Signale
        vertical: true
        icon: mdi:scoreboard
      - type: tile
        entity: sensor.iem_cologne_matches_today
        name: Matches heute
        vertical: true
        icon: mdi:calendar-today
      - type: tile
        entity: sensor.iem_cologne_last_score_change
        name: Letzte Aenderung
        vertical: true
        icon: mdi:clock-alert-outline

  # === TEAMS STAGE 1 + STAGE 2 ===
  - type: horizontal-stack
    cards:
      - type: markdown
        title: "Stage 1 - Challengers (2.-5. Juni)"
        content: >
          **Swiss Bo1 / Elim. Bo3 | 16 Teams | 8 weiter**


          {% set p = state_attr('sensor.iem_cologne_participants', 'stage_1') | default([]) %}

          {% if p | count > 0 %}

          {% for t in p %}

          - {{ t }}

          {% endfor %}

          {% else %}

          GamerLegion, B8, HEROIC, BetBoom, BIG, M80, TYLOO, MIBR, SINNERS, NRG,
          Gaimin Gladiators, Liquid, Lynn Vision, THUNDER dOWNUNDER, FlyQuest, Sharks

          {% endif %}

      - type: markdown
        title: "Stage 2 - Legends (6.-9. Juni)"
        content: >
          **Swiss Bo1 / Elim. Bo3 | 16 Teams | 8 weiter**


          **Direct Invites (8):**

          {% set p = state_attr('sensor.iem_cologne_participants', 'stage_2') | default([]) %}

          {% if p | count > 0 %}

          {% for t in p %}

          - {{ t }}

          {% endfor %}

          {% else %}

          FUT, Spirit, Astralis, G2, Legacy, Monte, 9z, paiN

          {% endif %}


          **+ 8x TBD** (Aufsteiger Stage 1)

  # === TEAMS STAGE 3 + PLAYOFFS ===
  - type: horizontal-stack
    cards:
      - type: markdown
        title: "Stage 3 - Champions (11.-15. Juni)"
        content: >
          **Swiss Bo3 | 16 Teams | 8 weiter**


          **Top Seeds / Direct Invites (8):**

          {% set p = state_attr('sensor.iem_cologne_participants', 'stage_3') | default([]) %}

          {% if p | count > 0 %}

          {% for t in p %}

          - {{ t }}

          {% endfor %}

          {% else %}

          Vitality, Natus Vincere, Falcons, The MongolZ, PARIVISION, Aurora, FURIA, MOUZ

          {% endif %}


          **+ 8x TBD** (Aufsteiger Stage 2)

      - type: markdown
        title: "Playoffs & Preisgeld (18.-21. Juni)"
        content: >
          **Single Elim. Bo3 / Grand Final Bo5 | 8 Teams**


          | Platz | Preisgeld |
          |-------|-----------|
          | 1. Platz | **500.000 USD** |
          | 2. Platz | 170.000 USD |
          | 3.-4. Platz | je 80.000 USD |
          | 5.-8. Platz | je 45.000 USD |
          | 9.-11. Platz | je 20.000 USD |
          | 12.-16. Platz | je 20.000 USD |
          | **Gesamt** | **1.250.000 USD** |


          **Map Pool:** Dust2, Mirage, Inferno, Nuke, Overpass, Ancient, Anubis

  # === SCORE SIGNALE + BRACKET ===
  - type: horizontal-stack
    cards:
      - type: markdown
        title: "Live Score-Signale"
        content: >
          {% set lines = state_attr('sensor.iem_cologne_score_signals', 'score_signal_lines') | default([]) %}

          {% set changed = state_attr('sensor.iem_cologne_score_signals', 'score_change_detected') %}

          {% if changed %}**Neue Signale erkannt!**{% endif %}

          {% if lines | count == 0 %}

          _Noch keine Signale - Turnier beginnt am 2. Juni 2026_

          {% else %}

          **{{ lines | count }} Signale:**

          {% for line in lines[:20] %}

          - {{ line }}

          {% endfor %}

          {% if lines | count > 20 %}_...und {{ lines | count - 20 }} weitere_{% endif %}

          {% endif %}

      - type: markdown
        title: "Bracket / Playoff-Signale"
        content: >
          {% set bracket = state_attr('sensor.iem_cologne_participants', 'bracket_lines') | default([]) %}

          {% if bracket | count == 0 %}

          _Keine Bracket-Signale (Playoffs: 18.-21. Juni 2026)_


          **Bracket-Format:**

          Quarterfinal -> Halbfinale -> Grand Final (Bo5)


          Alle 8 Playoff-Teams stehen nach Stage 3 (15. Juni) fest.

          {% else %}

          {% for line in bracket %}

          - {{ line }}

          {% endfor %}

          {% endif %}

  # === QUELLEN STATUS ===
  - type: markdown
    title: "Quellen & Diagnose"
    content: >
      {% set d = state_attr('sensor.iem_cologne_all_data', 'sources') | default({}) %}

      {% set liq = d.get('liquipedia', {}) %}

      {% set hltv = d.get('hltv', {}) %}

      {% set updated = state_attr('sensor.iem_cologne_all_data', 'updated_at') %}

      **Letztes Update:** {{ updated | default('unbekannt') }}
      &nbsp;|&nbsp;
      **Liquipedia:** {{ 'OK' if liq.get('ok') else 'FEHLER' }}
      &nbsp;|&nbsp;
      **HLTV:** {{ 'OK' if hltv.get('ok') else ('deaktiviert' if not hltv.get('enabled') else 'FEHLER') }}
      &nbsp;|&nbsp;
      **Genutzte URLs:** {{ hltv.get('used_urls', []) | count }}
      &nbsp;|&nbsp;
      **Verworfene URLs:** {{ hltv.get('dropped_urls', []) | count }}

  # === TEAM ROSTERS ===
  - type: markdown
    title: "Team Rosters (werden automatisch geladen)"
    content: >
      {% set rosters = state_attr('sensor.iem_cologne_participants', 'team_rosters') | default({}) %}
      {% if rosters | count == 0 %}
      _Rosters werden geladen (Liquipedia, ein Team alle 5 Minuten)..._
      {% else %}
      {% for team, players in rosters.items() %}
      **{{ team }}:** {{ players | join(', ') }}

      {% endfor %}
      {% endif %}
