title: IEM Cologne Major 2026
views:
  - title: Match Center
    path: iem-cologne
    cards:
      - type: grid
        square: false
        columns: 2
        cards:
          - type: tile
            entity: sensor.iem_cologne_phase
            name: Aktive Phase
            vertical: true
          - type: tile
            entity: sensor.iem_cologne_matches_today
            name: Matches heute
            vertical: true
          - type: tile
            entity: sensor.iem_cologne_score_signals
            name: Score-Signale
            vertical: true
          - type: tile
            entity: sensor.iem_cologne_participants
            name: Teams gesamt
            vertical: true

      - type: entities
        title: Update Tracking
        entities:
          - entity: sensor.iem_cologne_last_score_change
          - entity: sensor.iem_cologne_next_match
          - entity: sensor.iem_cologne_all_data

      - type: markdown
        title: Datenmodus
        content: |
          {% set src = state_attr('sensor.iem_cologne_all_data', 'sources') or {} %}
          {% set liq_ok = src.liquipedia.ok if src.liquipedia is defined else false %}
          {% if liq_ok %}
          Vollmodus: Strukturdaten aktiv (Teams, Stage-Infos, Bracket-Signale)
          {% else %}
          Fallback-Modus: Liquipedia limitiert, Signal-/Cache-Daten aktiv
          {% endif %}

      - type: gauge
        entity: sensor.iem_cologne_score_signals
        min: 0
        max: 40
        severity:
          green: 1
          yellow: 8
          red: 18
        name: Score-Signal Dichte

      - type: markdown
        title: Naechstes Match
        content: |
          {% set m = state_attr('sensor.iem_cologne_next_match', 'next_match') %}
          {% if m %}
          **{{ m.name or 'N/A' }}**  
          Status: {{ m.status }}  
          Start: {{ m.begin_at }}  
          Teams: {{ (m.opponents or []) | join(' vs ') }}
          {% else %}
          Kein naechstes Match verfuegbar.
          {% endif %}

      - type: markdown
        title: Juengste Score-Signale
        content: |
          {% set lines = state_attr('sensor.iem_cologne_score_signals', 'score_signal_lines') or [] %}
          {% if lines | count == 0 %}
          Noch keine Score-Signale erkannt.
          {% else %}
          {% for line in lines[:20] %}
          - {{ line }}
          {% endfor %}
          {% endif %}

      - type: markdown
        title: Stage Teams
        content: |
          {% set p = state_attr('sensor.iem_cologne_participants', 'stage_1') or [] %}
          ### Stage 1 ({{ p | count }})
          {{ p | join(', ') if p else 'N/A' }}

          {% set p2 = state_attr('sensor.iem_cologne_participants', 'stage_2') or [] %}
          ### Stage 2 ({{ p2 | count }})
          {{ p2 | join(', ') if p2 else 'N/A' }}

          {% set p3 = state_attr('sensor.iem_cologne_participants', 'stage_3') or [] %}
          ### Stage 3 ({{ p3 | count }})
          {{ p3 | join(', ') if p3 else 'N/A' }}

      - type: markdown
        title: Team Roster (Auszug)
        content: |
          {% set rosters = state_attr('sensor.iem_cologne_participants', 'team_rosters') or {} %}
          {% if rosters | count == 0 %}
          Keine Roster-Daten verfuegbar (Quelle aktuell im Fallback oder noch nicht erkannt).
          {% else %}
          {% for team, players in rosters.items() %}
          **{{ team }}**: {{ players | join(', ') if players else 'N/A' }}
          {% endfor %}
          {% endif %}

      - type: markdown
        title: Bracket / Playoffs Signale
        content: |
          {% set lines = state_attr('sensor.iem_cologne_participants', 'bracket_lines') or [] %}
          {% if lines | count == 0 %}
          Aktuell keine Bracket-Linien erkannt.
          {% else %}
          {% for line in lines[:16] %}
          - {{ line }}
          {% endfor %}
          {% endif %}

  - title: Quellen
    path: iem-cologne-sources
    cards:
      - type: markdown
        title: Datenquellen
        content: |
          **Primar:** Liquipedia Counter-Strike (MediaWiki API)  
          **Sekundar (Signal):** HLTV Eventseiten  
          Polling ist auf kurze Intervalle ausgelegt, um neue Scores schnell zu erkennen.

      - type: markdown
        title: Source State
        content: |
          {% set src = state_attr('sensor.iem_cologne_all_data', 'sources') or {} %}
          - Liquipedia OK: {{ src.liquipedia.ok if src.liquipedia is defined else 'n/a' }}
          - HLTV aktiviert: {{ src.hltv.enabled if src.hltv is defined else 'n/a' }}
          - HLTV OK: {{ src.hltv.ok if src.hltv is defined else 'n/a' }}
          - HLTV Fehler: {{ src.hltv.error if src.hltv is defined else 'n/a' }}

  - title: Mobile
    path: iem-cologne-mobile
    cards:
      - type: vertical-stack
        cards:
          - type: heading
            heading: IEM Cologne Mobile Center

          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: sensor.iem_cologne_phase
                name: Phase
                vertical: true
              - type: tile
                entity: sensor.iem_cologne_matches_today
                name: Heute
                vertical: true
              - type: tile
                entity: sensor.iem_cologne_score_signals
                name: Scores
                vertical: true
              - type: tile
                entity: sensor.iem_cologne_last_score_change
                name: Letzte Aenderung
                vertical: true

          - type: entities
            title: Schnellstatus
            show_header_toggle: false
            entities:
              - entity: sensor.iem_cologne_next_match
              - entity: sensor.iem_cologne_participants
              - entity: sensor.iem_cologne_all_data

          - type: markdown
            title: Next Up
            content: |
              {% set m = state_attr('sensor.iem_cologne_next_match', 'next_match') %}
              {% if m %}
              **{{ m.name or 'N/A' }}**

              {{ (m.opponents or []) | join(' vs ') }}

              Start: {{ m.begin_at or 'n/a' }}
              {% else %}
              Kein naechstes Match verfuegbar.
              {% endif %}

          - type: markdown
            title: Score Feed (Top 8)
            content: |
              {% set lines = state_attr('sensor.iem_cologne_score_signals', 'score_signal_lines') or [] %}
              {% if lines | count == 0 %}
              Keine Score-Signale vorhanden.
              {% else %}
              {% for line in lines[:8] %}
              - {{ line }}
              {% endfor %}
              {% endif %}
