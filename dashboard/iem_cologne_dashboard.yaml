title: IEM Cologne Major 2026
views:
  title: Match Center
  path: iem-cologne
  icon: mdi:trophy-outline
  cards:
    - type: markdown
      content: |
        ## IEM Cologne Major 2026
        **ESL | LANXESS Arena, Cologne, Germany**
        Preisgeld: **1.250.000 USD** | 32 Teams aus aller Welt
  
        | Stage 1 | Stage 2 | Stage 3 | Playoffs |
        |:-------:|:-------:|:-------:|:--------:|
        | 2.-5. Juni | 6.-9. Juni | 11.-15. Juni | 18.-21. Juni |
        | Challengers | Legends | Champions | Finale |
        | 16 Teams | 8+8 Teams | 8+8 Teams | 8 Teams |
  
    - type: grid
      square: false
      columns: 4
      cards:
        - type: tile
          entity: sensor.iem_cologne_phase
          name: Aktive Phase
          vertical: true
          icon: mdi:tournament
        - type: tile
          entity: sensor.iem_cologne_score_signals
          name: Score-Signale
          vertical: true
          icon: mdi:scoreboard
        - type: tile
          entity: sensor.iem_cologne_matches_today
          name: Matches heute
          vertical: true
          icon: mdi:calendar-today
        - type: tile
          entity: sensor.iem_cologne_last_score_change
          name: Letzte Aenderung
          vertical: true
          icon: mdi:clock-alert-outline
  
    - type: markdown
      title: "Stage 1 - Challengers (2.-5. Juni 2026)"
      content: |
        **Format:** Swiss Bo1 / Elimination Bo3 | **16 Teams - 8 kommen weiter**
        {% set p = state_attr('sensor.iem_cologne_participants', 'stage_1') | default([]) %}
        {% if p | count > 0 %}
        {{ p | join(' | ') }}
        {% else %}
        GamerLegion | B8 | HEROIC | BetBoom | BIG | M80 | TYLOO | MIBR |
        SINNERS | NRG | Gaimin Gladiators | Liquid | Lynn Vision | THUNDER dOWNUNDER | FlyQuest | Sharks
        {% endif %}
  
    - type: markdown
      title: "Stage 2 - Legends (6.-9. Juni 2026)"
      content: |
        **Format:** Swiss Bo1 / Elimination Bo3 | **8 Direct + 8 via Stage 1 - 8 kommen weiter**
  
        **Direct Invites:**
        {% set p = state_attr('sensor.iem_cologne_participants', 'stage_2') | default([]) %}
        {% if p | count > 0 %}
        {{ p | join(' | ') }}
        {% else %}
        FUT | Spirit | Astralis | G2 | Legacy | Monte | 9z | paiN
        {% endif %}
  
        + 8 x TBD (Aufsteiger Stage 1)
  
    - type: markdown
      title: "Stage 3 + Playoffs - Champions (11.-21. Juni 2026)"
      content: |
        **Format:** Swiss Bo3 -> Single Elim. Bo3 / Grand Final Bo5 | **Preis: bis 500.000 USD**
  
        **Top Seeds (Direct Invites):**
        {% set p = state_attr('sensor.iem_cologne_participants', 'stage_3') | default([]) %}
        {% if p | count > 0 %}
        {{ p | join(' | ') }}
        {% else %}
        Vitality | Natus Vincere | Falcons | The MongolZ | PARIVISION | Aurora | FURIA | MOUZ
        {% endif %}
  
        + 8 x TBD (Aufsteiger Stage 2) | Playoffs: 18.-21. Juni
  
    - type: markdown
      title: "Map Pool"
      content: |
        Dust2 | Mirage | Inferno | Nuke | Overpass | Ancient | Anubis
  
    - type: markdown
      title: "Live Score-Signale"
      content: |
        {% set lines = state_attr('sensor.iem_cologne_score_signals', 'score_signal_lines') | default([]) %}
        {% set changed = state_attr('sensor.iem_cologne_score_signals', 'score_change_detected') %}
        {% if changed %}_Neue Signale erkannt!_{% endif %}
        {% if lines | count == 0 %}
        _Noch keine Score-Signale - Turnier beginnt am 2. Juni 2026_
        {% else %}
        {% for line in lines[:15] %}
        - {{ line }}
        {% endfor %}
        {% if lines | count > 15 %}
        _...und {{ lines | count - 15 }} weitere_
        {% endif %}
        {% endif %}

