  title: Ergebnisse
  path: iem-cologne-ergebnisse
  icon: mdi:podium
  cards:
    - type: grid
      square: false
      columns: 2
      cards:
        - type: tile
          entity: sensor.iem_cologne_phase
          name: Aktive Phase
          icon: mdi:tournament
        - type: tile
          entity: sensor.iem_cologne_last_score_change
          name: Letzte Score-Aenderung
          icon: mdi:clock-alert-outline
  
    - type: markdown
      title: "Score-Signale (Live)"
      content: |
        {% set lines = state_attr('sensor.iem_cologne_score_signals', 'score_signal_lines') | default([]) %}
        {% set changed = state_attr('sensor.iem_cologne_score_signals', 'score_change_detected') %}
        {% if changed %}
        **Neue Ergebnisse erkannt!**
        {% endif %}
        {% if lines | count == 0 %}
        _Noch keine Score-Signale verfuegbar_
        _Das Turnier beginnt am 2. Juni 2026_
        {% else %}
        **{{ lines | count }} Signale erkannt:**
        {% for line in lines %}
        - {{ line }}
        {% endfor %}
        {% endif %}
  
    - type: markdown
      title: "Bracket / Playoff-Signale"
      content: |
        {% set bracket = state_attr('sensor.iem_cologne_participants', 'bracket_lines') | default([]) %}
        {% if bracket | count == 0 %}
        _Noch keine Bracket-Signale verfuegbar (Playoffs: 18.-21. Juni)_
        {% else %}
        {% for line in bracket %}
        - {{ line }}
        {% endfor %}
        {% endif %}
  
    - type: markdown
      title: "Playoffs - Bracket-Struktur"
      content: |
        **Single Elimination | 8 Teams**
  
        ```
        Quarterfinal  Halbfinale    Grand Final
        ------------------------------------------
        QF1  ->
                 SF1 ->
        QF2  ->          GF  ->  SIEGER
                 SF2 ->
        QF3  ->
                 SF2 ->
        QF4  ->
        ```
  
        Alle 8 Playoff-Teams werden nach Stage 3 (15. Juni) bekannt sein.
        Playoff-Brackets: 18. Juni 2026
  
    - type: markdown
      title: "Preisgeldverteilung"
      content: |
        | Platz | Preisgeld |
        |-------|-----------|
        | 1. Platz | **500.000 USD** |
        | 2. Platz | 170.000 USD |
        | 3.-4. Platz | je 80.000 USD |
        | 5.-8. Platz | je 45.000 USD |
        | 9.-11. Platz | je 20.000 USD |
        | 12.-16. Platz | je 20.000 USD |
        | **Gesamt** | **1.250.000 USD** |

  title: Quellen & Diagnose
  path: iem-cologne-sources
  icon: mdi:database-search
  cards:
    - type: markdown
      title: "Integration Status"
      content: |
        {% set d = state_attr('sensor.iem_cologne_all_data', 'sources') | default({}) %}
        {% set liq = d.get('liquipedia', {}) %}
        {% set hltv = d.get('hltv', {}) %}
        {% set updated = state_attr('sensor.iem_cologne_all_data', 'updated_at') %}
  
        **Letztes Update:** {{ updated | default('unbekannt') }}
  
        ### Liquipedia
        - **Status:** {{ 'OK' if liq.get('ok') else 'FEHLER: ' + (liq.get('error') | string) }}
        - **Seite:** {{ liq.get('page', '-') }}
        - **Modus:** {{ liq.get('policy_mode', '-') }}
  
        ### HLTV
        - **Aktiviert:** {{ 'Ja' if hltv.get('enabled') else 'Nein' }}
        - **Status:** {{ 'OK' if hltv.get('ok') else 'FEHLER: ' + (hltv.get('error') | string) }}
        - **Genutzte URLs:** {{ hltv.get('used_urls', []) | join(', ') | default('keine') }}
        - **Verworfene URLs:** {{ hltv.get('dropped_urls', []) | join(', ') | default('keine') }}
        - **Score-Signale erkannt:** {{ hltv.get('score_lines_detected', 0) }}
        - **Bracket-Signale erkannt:** {{ hltv.get('bracket_lines_detected', 0) }}
  
    - type: markdown
      title: "Turnierdaten-Quelle"
      content: |
        Die Turnierdaten (Teams, Stages, Termine) sind **fest im Code hinterlegt** und basieren
        auf verifizierten Daten von HLTV und Liquipedia (Stand: Mai 2026).
  
        **Teams Stage 1 (16):** Aus confirmed_participants in const.py
        **Teams Stage 2 (8 Direct):** Aus confirmed_invites in const.py
        **Teams Stage 3 (8 Direct):** Aus confirmed_invites in const.py
  
        Live-Netzwerkabrufe werden **nur fuer Score-Signale** verwendet.
  
    - type: entity
      entity: sensor.iem_cologne_phase
      name: Aktive Phase
  
    - type: entity
      entity: sensor.iem_cologne_participants
      name: Teilnehmer gesamt
  
    - type: entity
      entity: sensor.iem_cologne_score_signals
      name: Score-Signale
  
    - type: entity
      entity: sensor.iem_cologne_all_data
      name: Alle Daten (Rohdaten)

