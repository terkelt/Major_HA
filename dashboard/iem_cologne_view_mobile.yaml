title: Mobile
path: iem-cologne-mobile
icon: mdi:cellphone
cards:
  - type: markdown
    content: |
      ## IEM Cologne Major 2026
      LANXESS Arena, Cologne | 1.250.000 USD

  - type: grid
    square: false
    columns: 2
    cards:
      - type: tile
        entity: sensor.iem_cologne_phase
        name: Phase
        vertical: true
      - type: tile
        entity: sensor.iem_cologne_score_signals
        name: Signale
        vertical: true

  - type: markdown
    title: "Score-Feed"
    content: |
      {% set lines = state_attr('sensor.iem_cologne_score_signals', 'score_signal_lines') | default([]) %}
      {% if lines | count == 0 %}
      _Keine Signale - Start: 2. Juni 2026_
      {% else %}
      {% for line in lines[:8] %}
      - {{ line }}
      {% endfor %}
      {% endif %}

  - type: markdown
    title: "Teams (Kurzuebersicht)"
    content: |
      **Stage 1 (16):** GamerLegion, B8, HEROIC, BetBoom, BIG, M80, TYLOO, MIBR,
      SINNERS, NRG, Gaimin Gladiators, Liquid, Lynn Vision, THUNDER dOWNUNDER, FlyQuest, Sharks

      **Stage 2 (8 direct):** FUT, Spirit, Astralis, G2, Legacy, Monte, 9z, paiN

      **Stage 3 (8 direct):** Vitality, NaVi, Falcons, The MongolZ, PARIVISION, Aurora, FURIA, MOUZ
